<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <!-- 颜色定义 -->
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b400ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neonBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:1" />
    </linearGradient>
    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- 背景几何形状 -->
  <!-- 底部大三角形 -->
  <path d="M200 50 L380 200 L20 200 Z" fill="url(#neonPurple)" filter="url(#glow)" />
  <!-- 右侧三角形 -->
  <path d="M200 80 L350 180 L200 120 Z" fill="url(#neonBlue)" filter="url(#glow)" />
  <!-- 左侧三角形 -->
  <path d="M200 80 L50 180 L200 120 Z" fill="url(#neonBlue)" filter="url(#glow)" />
  <!-- 顶部小三角形 -->
  <path d="M200 110 L250 160 L150 160 Z" fill="url(#neonBlue)" filter="url(#glow)" />
  
  <!-- 文字效果 -->
  <!-- 文字外边框 - 紫色 -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="none" stroke="url(#neonPurple)" stroke-width="6" filter="url(#glow)">
    牌子来电竞
  </text>
  <!-- 文字内边框 - 蓝色 -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="none" stroke="url(#neonBlue)" stroke-width="3" filter="url(#glow)">
    牌子来电竞
  </text>
  <!-- 文字主体 -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="url(#textGradient)">
    牌子来电竞
  </text>
  
  <!-- 额外的发光效果 -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glow)">
    牌子来电竞
  </text>
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="none" stroke="#0066ff" stroke-width="1" filter="url(#glow)">
    牌子来电竞
  </text>
</svg>